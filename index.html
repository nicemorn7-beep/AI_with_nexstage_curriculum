<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 공감 다이어리 🌸</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Noto+Sans+KR:wght@300;400;500&display=swap"
    rel="stylesheet"
  />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream:      #FDF6EC;
      --paper:      #FFFDF8;
      --line:       #F0E2CC;
      --accent:     #E8845A;
      --accent2:    #D4506A;
      --text-dark:  #5D3A2A;
      --text-mid:   #8B6350;
      --text-light: #B89880;
      --rose-bg:    #FFF5F5;
      --shadow:     rgba(139, 69, 19, 0.10);
    }

    body {
      background-color: var(--cream);
      background-image:
        radial-gradient(ellipse 80% 50% at 10% 10%, #FDE8D0 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 90% 90%, #F9E0E0 0%, transparent 60%);
      min-height: 100vh;
      font-family: 'Noto Sans KR', sans-serif;
      color: var(--text-dark);
    }

    .wrap { max-width: 660px; margin: 0 auto; padding: 48px 20px 80px; }

    header { text-align: center; margin-bottom: 40px; }
    header h1 { font-family: 'Nanum Myeongjo', serif; font-size: 1.9rem; font-weight: 800; color: var(--text-dark); letter-spacing: -0.01em; margin-bottom: 6px; }
    header .subtitle { font-size: 0.88rem; color: var(--text-light); letter-spacing: 0.04em; }
    #currentDate { display: inline-block; margin-top: 10px; font-size: 0.82rem; background: #fff; color: var(--text-mid); padding: 4px 14px; border-radius: 20px; border: 1px solid var(--line); letter-spacing: 0.05em; }

    .card { background: var(--paper); border-radius: 18px; padding: 28px 32px; box-shadow: 0 4px 24px var(--shadow), 0 1px 4px rgba(0,0,0,0.04); margin-bottom: 20px; position: relative; overflow: hidden; }
    .card::before { content: ''; position: absolute; inset: 0; background: repeating-linear-gradient(transparent, transparent 31px, var(--line) 31px, var(--line) 32px); opacity: 0.25; pointer-events: none; border-radius: 18px; }
    .card-accent { border-left: 4px solid var(--accent); }

    .field-label { font-size: 0.82rem; font-weight: 500; color: var(--text-light); margin-bottom: 14px; letter-spacing: 0.06em; position: relative; }

    textarea#diaryInput { width: 100%; border: none; background: transparent; font-family: 'Nanum Myeongjo', serif; font-size: 1.08rem; line-height: 1.85; color: var(--text-dark); resize: none; outline: none; min-height: 72px; position: relative; z-index: 1; }
    textarea#diaryInput::placeholder { color: #C8AE96; }

    .char-count { font-size: 0.75rem; color: var(--text-light); text-align: right; margin-top: 6px; position: relative; z-index: 1; }
    .char-count.warn { color: var(--accent2); }

    .btn-submit { width: 100%; padding: 14px; margin-top: 14px; background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; border: none; border-radius: 12px; font-family: 'Noto Sans KR', sans-serif; font-size: 0.97rem; font-weight: 500; letter-spacing: 0.02em; cursor: pointer; transition: transform 0.18s, box-shadow 0.18s, opacity 0.18s; position: relative; z-index: 1; }
    .btn-submit:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(232, 132, 90, 0.38); }
    .btn-submit:active:not(:disabled) { transform: translateY(0); }
    .btn-submit:disabled { opacity: 0.65; cursor: not-allowed; }

    #loading { display: none; text-align: center; padding: 20px 0 8px; }
    #loading.show { display: block; }
    .dots { display: inline-flex; gap: 7px; align-items: center; }
    .dots span { width: 9px; height: 9px; border-radius: 50%; background: var(--accent); animation: dot-bounce 1.3s ease-in-out infinite; }
    .dots span:nth-child(2) { animation-delay: .18s; background: var(--accent2); }
    .dots span:nth-child(3) { animation-delay: .36s; }
    @keyframes dot-bounce { 0%, 60%, 100% { transform: translateY(0); opacity: 0.7; } 30% { transform: translateY(-9px); opacity: 1; } }
    .loading-msg { margin-top: 10px; font-size: 0.88rem; color: var(--text-light); }

    #errorCard { display: none; background: #FFF5F5; border: 1px solid #FFCDD2; border-radius: 12px; padding: 16px 20px; color: #B71C1C; font-size: 0.88rem; margin-bottom: 16px; }
    #errorCard.show { display: block; }

    #responseCard { display: none; background: linear-gradient(150deg, #FFF5F5 0%, var(--rose-bg) 50%, #FFF8F0 100%); border: 1px solid #F5D5C8; border-radius: 18px; padding: 28px 32px; margin-bottom: 20px; box-shadow: 0 6px 28px rgba(212, 80, 106, 0.09); animation: fade-up 0.45s ease both; }
    #responseCard.show { display: block; }
    @keyframes fade-up { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

    .emotion-pill { display: inline-flex; align-items: center; gap: 6px; background: #FFE0E8; color: var(--accent2); padding: 5px 14px; border-radius: 20px; font-size: 0.88rem; font-weight: 500; margin-bottom: 18px; }
    .ai-label { font-size: 0.75rem; font-weight: 500; color: var(--text-light); letter-spacing: 0.08em; margin-bottom: 10px; }
    .response-body { font-family: 'Nanum Myeongjo', serif; font-size: 1.04rem; line-height: 1.95; color: #6D4C41; }
    .response-body p { margin-bottom: 10px; }
    .response-body p:last-child { margin-bottom: 0; }
    .response-closing { margin-top: 18px; padding-top: 14px; border-top: 1px solid #F5D5C8; font-style: italic; color: var(--text-light); font-size: 0.93rem; }

    .section-title { font-family: 'Nanum Myeongjo', serif; font-size: 1.05rem; color: var(--text-dark); margin-bottom: 14px; padding-bottom: 10px; border-bottom: 2px solid var(--line); display: flex; align-items: center; justify-content: space-between; }
    .entry-count { font-size: 0.78rem; color: var(--text-light); font-family: 'Noto Sans KR', sans-serif; }
    .entry-item { background: var(--paper); border-radius: 14px; padding: 18px 22px; margin-bottom: 10px; box-shadow: 0 2px 10px var(--shadow); cursor: pointer; transition: border-left 0.15s, transform 0.15s; border-left: 3px solid transparent; }
    .entry-item:hover { border-left-color: var(--accent); transform: translateX(3px); }
    .entry-meta { font-size: 0.77rem; color: var(--text-light); margin-bottom: 5px; }
    .entry-text { font-family: 'Nanum Myeongjo', serif; font-size: 0.93rem; color: var(--text-dark); margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .entry-emotion { font-size: 0.82rem; color: var(--accent2); }
    .empty-state { text-align: center; padding: 36px 20px; color: var(--text-light); font-size: 0.9rem; line-height: 1.8; }

    #apiKeyBanner { background: linear-gradient(135deg, #FFF8F0, #FFF0F5); border: 1.5px dashed #E8C4A8; border-radius: 14px; padding: 20px 24px; margin-bottom: 20px; animation: fade-up 0.35s ease both; }
    #apiKeyBanner.hidden { display: none; }
    .api-banner-title { font-size: 0.88rem; font-weight: 500; color: var(--text-mid); margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
    .api-input-row { display: flex; gap: 8px; align-items: stretch; }
    #apiKeyInput { flex: 1; border: 1.5px solid var(--line); border-radius: 10px; padding: 10px 14px; font-family: 'Noto Sans KR', sans-serif; font-size: 0.88rem; color: var(--text-dark); background: #fff; outline: none; transition: border-color 0.18s; min-width: 0; }
    #apiKeyInput:focus { border-color: var(--accent); }
    #apiKeyInput::placeholder { color: #C8AE96; letter-spacing: 0.02em; }
    .btn-save-key { padding: 10px 18px; background: var(--accent); color: #fff; border: none; border-radius: 10px; font-family: 'Noto Sans KR', sans-serif; font-size: 0.88rem; font-weight: 500; cursor: pointer; white-space: nowrap; transition: background 0.18s, transform 0.15s; flex-shrink: 0; }
    .btn-save-key:hover { background: var(--accent2); transform: translateY(-1px); }
    #apiKeyStatus { margin-top: 8px; font-size: 0.78rem; min-height: 18px; }
    #apiKeyStatus.ok  { color: #2E7D32; }
    #apiKeyStatus.err { color: #B71C1C; }
    #apiKeySaved { display: flex; align-items: center; justify-content: space-between; background: #F0FBF1; border: 1px solid #C8E6C9; border-radius: 12px; padding: 11px 18px; margin-bottom: 20px; font-size: 0.84rem; color: #2E7D32; }
    #apiKeySaved.hidden { display: none; }
    #apiKeySaved .key-preview { display: flex; align-items: center; gap: 7px; }
    .btn-change-key { background: none; border: 1px solid #A5D6A7; border-radius: 8px; padding: 4px 12px; font-size: 0.78rem; color: #388E3C; cursor: pointer; transition: background 0.15s; font-family: 'Noto Sans KR', sans-serif; }
    .btn-change-key:hover { background: #E8F5E9; }

    @media (max-width: 520px) { .card { padding: 22px 20px; } #responseCard { padding: 22px 20px; } header h1 { font-size: 1.55rem; } .api-input-row { flex-direction: column; } .btn-save-key { width: 100%; } }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>🌸 AI 공감 다이어리</h1>
      <p class="subtitle">오늘의 이야기를 들려주세요 — AI가 함께 마음을 나눌게요</p>
      <div id="currentDate"></div>
    </header>

    <div id="apiKeyBanner" class="hidden">
      <div class="api-banner-title">🔑 OpenRouter API 키를 입력해 주세요</div>
      <div class="api-input-row">
        <input type="password" id="apiKeyInput" placeholder="sk-or-v1-..." autocomplete="off" spellcheck="false" />
        <button class="btn-save-key" id="saveKeyBtn">저장</button>
      </div>
      <div id="apiKeyStatus"></div>
    </div>

    <div id="apiKeySaved" class="hidden">
      <div class="key-preview">✅ <span id="keyPreview"></span></div>
      <button class="btn-change-key" id="changeKeyBtn">변경</button>
    </div>

    <div class="card card-accent">
      <div class="field-label">✏️ 오늘 하루 어땠나요?</div>
      <textarea id="diaryInput" placeholder="오늘 있었던 일을 한 줄로 적어보세요..." maxlength="300" rows="3"></textarea>
      <div class="char-count" id="charCount">0 / 300</div>
      <button class="btn-submit" id="submitBtn">💌 AI에게 마음 전하기</button>
    </div>

    <div id="loading">
      <div class="dots"><span></span><span></span><span></span></div>
      <p class="loading-msg">마음을 읽고 있어요...</p>
    </div>

    <div id="errorCard"></div>

    <div id="responseCard">
      <div class="ai-label">💜 AI의 공감 메시지</div>
      <div class="emotion-pill" id="emotionPill"></div>
      <div class="response-body">
        <p id="empathyText"></p>
        <p id="comfortText"></p>
      </div>
      <div class="response-closing" id="closingText"></div>
    </div>

    <div>
      <div class="section-title">
        📖 지난 일기들
        <span class="entry-count" id="entryCount"></span>
      </div>
      <div id="pastEntries"></div>
    </div>
  </div>

  <script>
    const MODEL   = 'deepseek/deepseek-chat-v3.1';
    const API_URL = 'https://openrouter.ai/api/v1/chat/completions';
    const KEY_STORAGE = 'openrouter_api_key';
    const DIARY_STORAGE = 'empathy_diary_v1';

    const SYSTEM_PROMPT = `당신은 따뜻하고 공감 능력이 깊은 AI 일기 친구입니다.
사용자가 오늘 있었던 일을 짧게 공유하면, 감정을 세심하게 파악하고 진심 어린 위로를 건네주세요.

반드시 아래 JSON 형식으로만 응답하세요 (다른 텍스트 금지):
{
  "emotion": "감지된 주요 감정 한 단어 + 어울리는 이모지 (예: '😊 기쁨', '😢 슬픔', '😰 불안', '😤 화남', '😌 평온', '🥹 감동', '😓 지침')",
  "empathy": "공감 메시지 — 사용자의 감정을 충분히 이해하고 공감하는 내용 2~3문장",
  "comfort": "위로·격려 메시지 — 상황에 맞는 따뜻한 말 2~3문장",
  "closing": "마무리 한 문장 — 오늘 하루를 따뜻하게 마무리하는 말"
}

한국어로만 작성하고, 진심 어리고 부드러운 톤을 유지하세요.`;

    const $ = id => document.getElementById(id);
    const escHtml = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    const sleep = ms => new Promise(r => setTimeout(r, ms));
    let isLoading = false;

    function getSavedKey() { return localStorage.getItem(KEY_STORAGE) || ''; }
    function saveKey(key) { localStorage.setItem(KEY_STORAGE, key.trim()); }

    function renderKeyUI() {
      const key = getSavedKey();
      if (key) {
        $('apiKeyBanner').classList.add('hidden');
        $('apiKeySaved').classList.remove('hidden');
        $('keyPreview').textContent = `API 키 저장됨 (${key.slice(0, 12)}***)`;
      } else {
        $('apiKeyBanner').classList.remove('hidden');
        $('apiKeySaved').classList.add('hidden');
      }
    }

    function initKeyUI() {
      renderKeyUI();
      $('saveKeyBtn').addEventListener('click', () => {
        const val = $('apiKeyInput').value.trim();
        const status = $('apiKeyStatus');
        if (!val) { status.textContent = '키를 입력해 주세요.'; status.className = 'err'; return; }
        if (!val.startsWith('sk-')) { status.textContent = '올바른 OpenRouter API 키 형식이 아니에요 (sk-or-v1-... 로 시작).'; status.className = 'err'; return; }
        saveKey(val);
        $('apiKeyInput').value = '';
        status.textContent = '';
        renderKeyUI();
      });
      $('apiKeyInput').addEventListener('keydown', e => { if (e.key === 'Enter') $('saveKeyBtn').click(); });
      $('changeKeyBtn').addEventListener('click', () => { localStorage.removeItem(KEY_STORAGE); renderKeyUI(); setTimeout(() => $('apiKeyInput').focus(), 50); });
    }

    (function init() {
      const opts = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
      $('currentDate').textContent = new Date().toLocaleDateString('ko-KR', opts);
      initKeyUI();
      renderEntries();
      $('diaryInput').addEventListener('input', onInput);
      $('diaryInput').addEventListener('keydown', onKeydown);
      $('submitBtn').addEventListener('click', submit);
    })();

    function onInput() {
      const len = $('diaryInput').value.length;
      const el = $('charCount');
      el.textContent = `${len} / 300`;
      el.classList.toggle('warn', len > 250);
    }

    function onKeydown(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submit(); } }

    async function submit() {
      if (isLoading) return;
      const apiKey = getSavedKey();
      if (!apiKey) {
        $('apiKeyBanner').classList.remove('hidden');
        $('apiKeySaved').classList.add('hidden');
        $('apiKeyInput').focus();
        showError('먼저 OpenRouter API 키를 입력하고 저장해 주세요 🔑');
        return;
      }
      const text = $('diaryInput').value.trim();
      if (!text) { showError('오늘 있었던 일을 한 줄 적어주세요 😊'); return; }
      if (text.length < 2) { showError('조금 더 자세히 적어주시면 더 잘 공감할 수 있어요.'); return; }
      setLoading(true); hideError(); hideResponse();
      try {
        const res = await fetchWithRetry(apiKey, { model: MODEL, messages: [{ role: 'system', content: SYSTEM_PROMPT }, { role: 'user', content: text }], temperature: 0.82, max_tokens: 600 });
        const raw = res.choices?.[0]?.message?.content ?? '';
        const result = parseJSON(raw);
        if (!result) throw new Error('AI 응답을 이해하지 못했어요. 다시 시도해 주세요.');
        showResponse(result); saveEntry(text, result); renderEntries();
        $('diaryInput').value = ''; onInput();
      } catch (err) {
        showError(err.message || '일시적인 오류가 발생했어요. 잠시 후 다시 시도해 주세요.');
      } finally { setLoading(false); }
    }

    async function fetchWithRetry(apiKey, body, retries = 2) {
      for (let attempt = 0; attempt <= retries; attempt++) {
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 30000);
        let res;
        try {
          res = await fetch(API_URL, { method: 'POST', headers: { 'Authorization': `Bearer ${apiKey}`, 'Content-Type': 'application/json', 'HTTP-Referer': location.href, 'X-Title': 'AI 공감 다이어리' }, body: JSON.stringify(body), signal: controller.signal });
        } catch (e) {
          clearTimeout(timeout);
          if (e.name === 'AbortError') throw new Error('응답 시간이 너무 길어요. 잠시 후 다시 시도해 주세요.');
          if (attempt < retries) { await sleep(1000); continue; }
          throw new Error('네트워크 연결을 확인해 주세요.');
        }
        clearTimeout(timeout);
        if (res.ok) return res.json();
        const errBody = await res.json().catch(() => ({}));
        const msg = errBody?.error?.message ?? `HTTP ${res.status}`;
        if (res.status === 429 && attempt < retries) { await sleep(1500 * (attempt + 1)); continue; }
        if (res.status === 401) { localStorage.removeItem(KEY_STORAGE); renderKeyUI(); throw new Error('API 키가 유효하지 않아요. 키를 다시 확인하고 입력해 주세요 🔑'); }
        if ((res.status === 503 || res.status === 502) && attempt < retries) { await sleep(1200); continue; }
        throw new Error(msg);
      }
    }

    function parseJSON(raw) {
      try { return JSON.parse(raw); } catch {}
      const m = raw.match(/\{[\s\S]*\}/);
      if (!m) return null;
      try { return JSON.parse(m[0]); } catch {}
      return null;
    }

    function setLoading(on) { isLoading = on; $('loading').classList.toggle('show', on); $('submitBtn').disabled = on; }
    function showError(msg) { $('errorCard').textContent = `⚠️ ${msg}`; $('errorCard').classList.add('show'); }
    function hideError() { $('errorCard').classList.remove('show'); }
    function showResponse(r) {
      $('emotionPill').textContent  = r.emotion  ?? '💭 감정';
      $('empathyText').textContent  = r.empathy  ?? '';
      $('comfortText').textContent  = r.comfort  ?? '';
      $('closingText').textContent  = r.closing  ?? '';
      $('responseCard').classList.add('show');
      $('responseCard').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
    function hideResponse() { $('responseCard').classList.remove('show'); }

    function getEntries() { try { return JSON.parse(localStorage.getItem(DIARY_STORAGE) ?? '[]'); } catch { return []; } }
    function saveEntry(text, result) {
      const entries = getEntries();
      entries.unshift({ id: Date.now(), date: new Date().toISOString(), text, ...result });
      localStorage.setItem(DIARY_STORAGE, JSON.stringify(entries.slice(0, 60)));
    }
    function renderEntries() {
      const entries = getEntries();
      $('entryCount').textContent = entries.length ? `총 ${entries.length}편` : '';
      if (!entries.length) { $('pastEntries').innerHTML = '<div class="empty-state">아직 기록된 일기가 없어요.<br>오늘의 이야기를 들려주세요 🌱</div>'; return; }
      $('pastEntries').innerHTML = entries.map(e => {
        const d = new Date(e.date);
        const dateStr = d.toLocaleDateString('ko-KR', { month: 'long', day: 'numeric', weekday: 'short' });
        const timeStr = d.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
        return `<div class="entry-item" data-id="${e.id}"><div class="entry-meta">${dateStr} · ${timeStr}</div><div class="entry-text">${escHtml(e.text)}</div><div class="entry-emotion">${e.emotion ?? ''}</div></div>`;
      }).join('');
      $('pastEntries').querySelectorAll('.entry-item').forEach(el => {
        el.addEventListener('click', () => { const entry = getEntries().find(e => e.id === Number(el.dataset.id)); if (entry) showResponse(entry); });
      });
    }
  </script>
</body>
</html>
